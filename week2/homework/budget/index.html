<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/index.css" />
    <title>소이의 가계부</title>
</head>
<body>
    <!--header-->
    <header class="header-container">
        <p class="reset-icn">💸</p>
        <h1>소이의 가계부</h1>
        <p>SOPT 38th WEB</p>
    </header>

    <main class="main-container">
        <!-- 필터섹션 -->
        <section class="filter-section">
            <h2>검색 필터</h2>
            <form class="filter-form">
                <!-- 제목 -->
                <div class="filter-item filter-title">
                    <label for="filter-name">제목</label>
                    <input type="text" id="filter-name" placeholder="내역을 입력하세요">
                </div>

                <!-- 유현 -->
                <div class="filter-item filter-type">
                    <label>유형</label>
                    <div class="custom-select">
                        <select id="filter-type">
                            <option value="all">전체</option>
                        </select>
                    </div>
                </div>

                <!-- 카테고리 -->
                <div class="filter-item filter-category">
                    <label>카테고리</label>
                    <div class="custom-select">
                        <select id="filter-category">
                            <option value="all">전체</option>
                        </select>
                    </div>
                </div>

                <!-- 결제수단 -->
                <div class="filter-item filter-payment">
                    <label>결제수단</label>
                    <div class="custom-select">
                        <select id="filter-payment">
                            <option value="all">전체</option>
                        </select>
                    </div>
                </div>

                <!-- 버튼 -->
                <button type="submit" class="btn-apply">적용</button>
                <button type="button" class="btn-reset">초기화</button>
            </form>
        </section>

        
    </main>




    <script type="module" src="index.js"></script>
</body>
</html>
