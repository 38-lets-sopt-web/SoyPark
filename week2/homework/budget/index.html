<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/index.css" />
    <title>소이의 가계부</title>
</head>
<body>
    <!--헤더-->
    <header class="header-container">
        <button type="button" id="reload-icn">💸</button>
        <h1>소이의 가계부</h1>
        <p>SOPT 38th WEB</p>
    </header>

    <main class="main-container">
        <!-- 필터섹션 -->
        <section class="filter-section">
            <h2>검색 필터</h2>
            <form class="filter-form">
                <!-- 제목 -->
                <div class="filter-item filter-title">
                    <label for="filter-name">제목</label>
                    <input type="text" id="filter-name" placeholder="내역을 입력하세요">
                </div>

                <!-- 유형 -->
                <div class="filter-item filter-type">
                    <label for="filter-type">유형</label>
                    <div class="custom-select">
                        <select id="filter-type" name="type">
                            <option value="all">전체</option>
                        </select>
                    </div>
                </div>

                <!-- 카테고리 -->
                <div class="filter-item filter-category">
                    <label for="filter-category">카테고리</label>
                    <div class="custom-select">
                        <select id="filter-category" name="category">
                            <option value="all">전체</option>
                        </select>
                    </div>
                </div>

                <!-- 결제수단 -->
                <div class="filter-item filter-payment">
                    <label for="filter-payment">결제수단</label>
                    <div class="custom-select">
                        <select id="filter-payment" name="payment">
                            <option value="all">전체</option>
                        </select>
                    </div>
                </div>

                <!-- 버튼 -->
                <button type="submit" id="btn-apply">적용</button>
                <button type="button" id="btn-reset">초기화</button>
            </form>
        </section>

        <!--리스트 섹션-->
        <section class="list-section">
            <!--리스트 상단-->
            <div class="list-top-container">
                <div class="custom-select sort-select">
                    <select id="sort-order">
                        <option value="desc">날짜 내림차순</option>
                        <option value="asc">날짜 오름차순</option>
                    </select>
                    <span class="select-icon"></span>
                </div>
                <div class="list-btn-container">
                    <button type="button" id="btn-delete">선택 삭제</button>
                    <button type="button" id="add-btn">추가</button>
                </div>
            </div>

            <!--리스트-->
            <table class="budget-table">
                <thead>
                    <tr>
                        <th><input type="checkbox" id="check-all"></th>
                        <th>제목</th>
                        <th>금액</th>
                        <th>날짜</th>
                        <th>카테고리</th>
                        <th>결제수단</th>
                    </tr>
                </thead>
                <tbody id="budget-list-body">
                </tbody>
            </table>
        </section>
    </main>

    <button type="button" id="detail-btn">상세 모달 테스트</button>

    <!--내역 추가 모달-->
    <dialog id="add-modal" class="modal-overlay hidden">
        <div class="modal-container">
            <div class="modal-header">
                <h2>내역 추가</h2>
                <button type="button" class="btn-close">✕</button>
            </div>

            <form class="modal-form">
                <div class="input-group">
                    <label>제목</label>
                    <input type="text" placeholder="제목을 입력하세요">
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>유형</label>
                        <div class="custom-select select">
                            <select><option>지출 (-)</option></select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>금액 (숫자만)</label>
                        <input type="number" placeholder="금액을 입력하세요">
                    </div>
                </div>

                <div class="input-group">
                    <label>날짜</label>
                    <input type="date" class="input-date">
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>카테고리</label>
                        <div class="custom-select select">
                            <select>
                                <option value="" disabled selected>선택</option>
                                <option>식비</option>
                                <option>쇼핑</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>결제수단</label>
                        <div class="custom-select select">
                            <select>
                                <option value="" disabled selected>선택</option>
                                <option>현금</option>
                                <option>신용카드</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button type="submit" id="modal-btn-add">추가</button>
            </form>
        </div>
    </dialog>

    <!--세부 내용 모달-->
    <dialog id="detail-modal" class="modal-overlay hidden">
        <div class="modal-container">
            <div class="modal-header">
                <h2>항목 상세</h2>
                <button type="button" class="btn-close">✕</button>
            </div>
            <ul class="detail-list">
                <li><span class="detail-label">제목</span><span class="detail-value">떡꼬치 냠냠</span></li>
                <li><span class="detail-label">금액</span><span class="detail-value">-2,000원</span></li>
                <li><span class="detail-label">날짜</span><span class="detail-value">2026-04-09</span></li>
                <li><span class="detail-label">카테고리</span><span class="detail-value">식비</span></li>
                <li><span class="detail-label">결제수단</span><span class="detail-value">신용카드</span></li>
            </ul>
        </div>
    </dialog>

    
    <script type="module" src="./scripts/index.js"></script>
</body>
</html>
