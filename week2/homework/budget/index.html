<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/index.css" />
    <title>소이의 가계부</title>
</head>
<body>
    <!--헤더-->
    <header class="header-container">
        <button type="button" id="reload-icn">💸</button>
        <h1>소이의 가계부</h1>
        <p>SOPT 38th WEB</p>
    </header>

    <main class="main-container">
        <!-- 필터섹션 -->
        <section class="filter-section">
            <h2>검색 필터</h2>
            <form class="filter-form">
                <!-- 제목 -->
                <div class="filter-item filter-title">
                    <label for="filter-name">제목</label>
                    <input type="text" id="filter-name" placeholder="내역을 입력하세요">
                </div>

                <!-- 유형 -->
                <div class="filter-item filter-type">
                    <label for="filter-type">유형</label>
                    <div class="custom-select">
                        <select id="filter-type" data-options-template="priceType-options-template">
                            <option value="all">전체</option>
                        </select>
                    </div>
                </div>

                <!-- 카테고리 -->
                <div class="filter-item filter-category">
                    <label for="filter-category">카테고리</label>
                    <div class="custom-select">
                        <select id="filter-category" data-options-template="category-options-template">
                            <option value="all">전체</option>
                        </select>
                    </div>
                </div>

                <!-- 결제수단 -->
                <div class="filter-item filter-payment">
                    <label for="filter-payment">결제수단</label>
                    <div class="custom-select">
                        <select id="filter-payment" data-options-template="payment-options-template">
                            <option value="all">전체</option>
                        </select>
                    </div>
                </div>

                <!-- 적용/초기화 버튼 -->
                <button type="submit" id="btn-apply">적용</button>
                <button type="button" id="btn-reset">초기화</button>
            </form>
        </section>

        <!--리스트 섹션-->
        <section class="list-section">
            <!--리스트 상단-->
            <div class="list-top-container">
                <div class="custom-select sort-select">
                    <select id="sort-order">
                        <option value="" selected>정렬</option>
                        <option value="desc">날짜 내림차순</option>
                        <option value="asc">날짜 오름차순</option>
                    </select>
                    <span class="select-icon"></span>
                </div>
            <!-- 추가/삭제 버튼 -->
                <div class="list-btn-container">
                    <button type="button" id="btn-delete">선택 삭제</button>
                    <button type="button" data-target="add-modal">추가</button>
                </div>
            </div>

            <!--리스트-->
            <table class="budget-table">
                <thead>
                    <tr>
                        <th><input type="checkbox" id="check-all"></th>
                        <th class="title">제목</th>
                        <th class="amount">금액</th>
                        <th class="date">날짜</th>
                        <th class="category">카테고리</th>
                        <th class="payment">결제수단</th>
                    </tr>
                </thead>
                <tbody id="budget-list-body">
                </tbody>
            </table>
        </section>
    </main>

    <!--내역 추가 모달-->
    <dialog id="add-modal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h2>내역 추가</h2>
                <button type="button" class="btn-close">✕</button>
            </div>

            <form class="modal-form">
                <div class="input-group">
                    <label for="add-title">제목</label>
                    <input id="add-title" type="text" placeholder="제목을 입력하세요">
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>유형</label>
                        <div class="custom-select select">
                            <select id="add-price-type" data-options-template="priceType-options-template">
                                <option value="">선택</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="add-amount">금액 (숫자만)</label>
                        <input id="add-amount" type="number" placeholder="금액을 입력하세요">
                    </div>
                </div>

                <div class="input-group">
                    <label for="add-date">날짜</label>
                    <input id="add-date" type="date">
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>카테고리</label>
                        <div class="custom-select select">
                            <select id="add-category" data-options-template="category-options-template">
                                <option value="" disabled selected>선택</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>결제수단</label>
                        <div class="custom-select select">
                            <select id="add-payment" data-options-template="payment-options-template">
                                <option value="" disabled selected>선택</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button type="submit" id="modal-btn-add">추가</button>
            </form>
        </div>
    </dialog>

    <!--세부 내용 모달-->
    <dialog id="detail-modal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h2>항목 상세</h2>
                <button type="button" class="btn-close">✕</button>
            </div>
            <ul class="detail-list">
                <li><span class="detail-label">제목</span><span class="detail-value"></span></li>
                <li><span class="detail-label">금액</span><span class="detail-value"></span></li>
                <li><span class="detail-label">날짜</span><span class="detail-value"></span></li>
                <li><span class="detail-label">카테고리</span><span class="detail-value"></span></li>
                <li><span class="detail-label">결제수단</span><span class="detail-value"></span></li>
            </ul>
        </div>
    </dialog>


    <!-- 템플릿 -->
    <template id="budget-row-template">
        <tr>
            <td><input type="checkbox" class="list-check"></td>
            <td class="list-title"></td> 
            <td class="list-amount"></td>
            <td class="list-date"></td>
            <td class="list-category"></td>
            <td class="list-payment"></td>
        </tr>
    </template>

    <template id="priceType-options-template">
        <option value="지출">지출</option>
        <option value="수익">수익</option>
    </template>

    <template id="category-options-template">
        <option value="식비">식비</option>
        <option value="쇼핑">쇼핑</option>
        <option value="문화">문화</option>
        <option value="교통">교통</option>
        <option value="생활">생활</option>
        <option value="기타">기타</option>
    </template>

    <template id="payment-options-template">
        <option value="현금">현금</option>
        <option value="카드">카드</option>
    </template>
    
    <script type="module" src="./scripts/index.js"></script>
</body>
</html>
